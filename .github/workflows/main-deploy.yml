name: Main Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Validate, Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, curl, dom, mbstring, iconv

      - name: Validate PHP API
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do php -l "$file"; done < <(find api -name '*.php' -print0)
          php api/tests/integration.php

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build application
        env:
          VITE_APP_BASE_PATH: /imoveis/
          VITE_API_URL: /imoveis/api
        run: npm run build

      - name: Prepare Hostinger artifact
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_DIR=.deploy-root
          mkdir -p "$DEPLOY_DIR/api"

          cp -R frontend/dist/. "$DEPLOY_DIR/"
          cp -R api/. "$DEPLOY_DIR/api/"
          rm -rf "$DEPLOY_DIR/api/tests" "$DEPLOY_DIR/api/.spec"
          cp hostinger/imoveis.htaccess "$DEPLOY_DIR/.htaccess"

          printf '%s\n' "$GITHUB_SHA" > "$DEPLOY_DIR/deploy-check.txt"
          touch "$DEPLOY_DIR/.nojekyll"

      - name: Publish hostinger-deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: hostinger-deploy
          folder: .deploy-root
          clean: true
          commit-message: "Deploy ${{ github.sha }}"
